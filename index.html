<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kerala Election Vote 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
font-family: Arial;
text-align: center;
background: #f5f5f5;
padding: 30px;
}

h1 {
margin-bottom: 30px;
}

button {
padding: 15px 30px;
margin: 10px;
border: none;
font-size: 18px;
color: white;
cursor: pointer;
border-radius: 8px;
}

.udf { background: blue; }
.ldf { background: red; }
.bjp { background: orange; }

#chartContainer {
width: 80%;
margin: auto;
margin-top: 40px;
}
</style>
</head>
<body>

<h1>2026 Kerala Legislative Assembly Election Online Vote</h1>

<button class="udf" onclick="vote('UDF')">UDF</button>
<button class="ldf" onclick="vote('LDF')">LDF</button>
<button class="bjp" onclick="vote('BJP')">BJP</button>

<div id="chartContainer">
<canvas id="voteChart"></canvas>
</div>

<script>
let votes = JSON.parse(localStorage.getItem("votes")) || {
UDF: 0,
LDF: 0,
BJP: 0
};

function vote(party) {
votes[party]++;
localStorage.setItem("votes", JSON.stringify(votes));
updateChart();
}

const ctx = document.getElementById('voteChart').getContext('2d');

const voteChart = new Chart(ctx, {
type: 'bar',
data: {
labels: ['UDF', 'LDF', 'BJP'],
datasets: [{
label: 'Votes',
data: [votes.UDF, votes.LDF, votes.BJP]
}]
},
options: {
responsive: true
}
});

function updateChart() {
voteChart.data.datasets[0].data = [
votes.UDF,
votes.LDF,
votes.BJP
];
voteChart.update();
}
</script>

</body>
</html>
