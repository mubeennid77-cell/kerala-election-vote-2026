<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kerala Election Vote</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{text-align:center;font-family:Arial;}
button{padding:15px;margin:10px;color:white;border:none;}
.udf{background:blue;}
.ldf{background:red;}
.bjp{background:orange;}
</style>
</head>
<body>

<h1>2026 Kerala Legislative Assembly Election Online Vote</h1>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Password">
<button onclick="register()">Login/Register</button>
 

<br><br>

<button class="udf" onclick="vote('UDF')">UDF</button>
<button class="ldf" onclick="vote('LDF')">LDF</button>
<button class="bjp" onclick="vote('BJP')">BJP</button>

<canvas id="chart"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.register = async function() {
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

try {
await signInWithEmailAndPassword(auth,email,password);
} catch {
await createUserWithEmailAndPassword(auth,email,password);
}
alert("Logged in successfully");
}

window.vote = async function(party) {
const user = auth.currentUser;
if (!user) {
alert("Login first");
return;
}

const voterRef = doc(db,"voters",user.email);
const voterSnap = await getDoc(voterRef);

if (voterSnap.exists()) {
alert("You already voted.");
return;
}

await setDoc(voterRef,{voted:true,party:party});

const partyRef = doc(db,"votes",party);
await updateDoc(partyRef,{count:increment(1)});

alert("Vote submitted successfully!");
}

</script>
</body>
</html>
